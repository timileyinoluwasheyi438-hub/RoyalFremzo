  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{ height:100%; background: var(--purple-deep); }

  body{

    justify-content:center;
    background:

  .splash::before{

      45deg,

<div class="splash">
  <div class="eyebrow" id="eyebrow"></div>

  <div class="wordmark" id="wordmark"></div>

  <div class="rule"></div>

  <div class="tagline" id="tagline"></div>

  <div class="loader">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    <span class="loader-label">Preparing your stay</span>
  </div>
</div>

<script>
  // Eyebrow: letter by letter
  const eyebrowText = "EST. LUXURY";
  const eyebrowEl = document.getElementById('eyebrow');
  [...eyebrowText].forEach((ch, i) => {
    const s = document.createElement('span');
    s.textContent = ch === " " ? "\u00A0" : ch;
    s.style.animationDelay = (0.15 + i * 0.035) + 's';
    eyebrowEl.appendChild(s);
  });

  // Wordmark: word by word, sliding up out of a clipped mask
  const words = [
    { text: "ROYAL", em: false },
    { text: "FREMZO", em: true }
  ];
  const wordmarkEl = document.getElementById('wordmark');
  let wDelay = 0.55;
  words.forEach((w, i) => {
    const wrap = document.createElement('span');
    wrap.className = 'word';
    const inner = document.createElement('span');
    inner.textContent = w.text;
    inner.style.animationDelay = wDelay + 's';
    if (w.em) {
      const em = document.createElement('em');
      em.textContent = w.text;
      inner.textContent = '';
      inner.appendChild(em);
    }
    wrap.appendChild(inner);
    wordmarkEl.appendChild(wrap);
    if (i < words.length - 1) wordmarkEl.appendChild(document.createTextNode(' '));
    wDelay += 0.22;
  });

  // Tagline: word by word blur-in
  const taglineText = "Hotel & Residences — where every arrival feels expected.";
  const taglineEl = document.getElementById('tagline');
  const tWords = taglineText.split(' ');
  let tDelay = 1.85;
  tWords.forEach((w, i) => {
    const s = document.createElement('span');
    s.className = 'word';
    s.textContent = w;
    s.style.animationDelay = tDelay + 's';
    taglineEl.appendChild(s);
    if (i < tWords.length - 1) taglineEl.appendChild(document.createTextNode(' '));
    tDelay += 0.09;
  });
  setTimeout(() => {
  window.location.href = "{% url 'core:home' %}";
}, 4200);
</script>
